<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoicePicker</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <button id="pick">選擇資料夾</button>
        <button id="editChars" class="ghost">編輯角色名單</button>
        <ul id="filelist"></ul>
      </aside>

      <main id="player">
        <h2 id="nowplaying">尚未選擇檔案</h2>
        <div id="waveform"></div>
        <div id="status"></div>
        <p class="hint">
          Space 播放/暫停 · A/D ±5秒 · W/S 跳留言點 · C 寫留言 · Tab 進網格（方向鍵選檔、Enter 開啟）
        </p>
      </main>

      <aside id="comments">
        <h3>留言（本檔）</h3>
        <ul id="commentlist"></ul>
      </aside>
    </div>

    <div id="grid" class="hidden"></div>

    <!-- 留言輸入 -->
    <div id="composer" class="modal hidden">
      <div class="modal-box">
        <div class="modal-head">留言 @ <span id="composerTime">0:00</span></div>
        <textarea id="composerText" rows="3" placeholder="輸入留言…（Enter 儲存，Shift+Enter 換行，Esc 取消）"></textarea>
        <div class="picker-label">掛角色（可不選）</div>
        <div id="composerChars" class="char-picker"></div>
      </div>
    </div>

    <!-- 詢問名字 -->
    <div id="nameModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-head">請輸入你的名字</div>
        <div class="picker-label">留言會標記來源，方便傳閱時辨識</div>
        <input id="nameInput" type="text" placeholder="你的名字（Enter 確認）" />
      </div>
    </div>

    <!-- 編輯角色名單 -->
    <div id="charModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-head">編輯角色名單</div>
        <ul id="charEditList"></ul>
        <div class="char-add">
          <input id="newCharName" type="text" placeholder="新角色名" />
          <select id="newCharRole">
            <option value="lead">主角</option>
            <option value="supporting">配角</option>
            <option value="mascot">吉祥物</option>
          </select>
          <button id="addCharBtn">新增</button>
        </div>
        <button id="closeCharBtn" class="primary">完成</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
